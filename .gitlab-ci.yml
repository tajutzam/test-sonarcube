variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
stages:
  - build_image
  - deploy_dev
  - deploy_prod
build_image:
  stage: build_image
  rules:
    - when: always
  tags:
    - maysa
  before_script:
    - echo $USER
    - export PACKAGE_JSON_VERSION=$(cat ./package.json | jq -r .version)
    - export VERSION=$PACKAGE_JSON_VERSION.$CI_PIPELINE_IID
    - echo $VERSION > version-file.txt
  script:
    - docker build -t $IMAGE_NAME:$VERSION .
  artifacts:
    paths:
      - version-file.txt
push_image:
  stage: build_image
  rules:
    - when: always
  dependencies:
    - build_image
  needs:
    - build_image
  tags:
    - maysa
  before_script:
    - export VERSION=$(cat version-file.txt)
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $IMAGE_NAME:$VERSION
  artifacts:
    paths:
      - version-file.txt
devdeploy:
  stage: deploy_dev
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^dev-*/'
      when: always
    - if: '$CI_COMMIT_BRANCH !~ /^dev-*/'
      when: never
  dependencies:
    - push_image
  tags:
    - maysa
  before_script:
    - export APP_PORT=8081
    - export DB_HOST=comment-db-svc.bookreview
    - export DB_PORT=5432
    - export DB_INSTANCE=bookcomments
    - export DB_UNAME=me
    - export DB_PASS=password
    - export VERSION=$(cat version-file.txt)
  script:
    - envsubst < k8s-dev/gitlabregcred.yaml | kubectl apply -f -
    - envsubst < k8s-dev/comment-secret.yaml | kubectl apply -f -
    - envsubst < k8s-dev/comment-deployment.yaml | kubectl apply -f -
    - envsubst < k8s-dev/comment-svc.yaml | kubectl apply -f -
  artifacts:
    paths:
      - version-file.txt
proddeploy:
  stage: deploy_prod
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH != "main"
      when: never
  dependencies:
    - push_image
  tags:
    - maysa
  before_script:
    - export APP_PORT=8081
    - export DB_HOST=comment-db-svc
    - export DB_PORT=5432
    - export DB_INSTANCE=bookcomments
    - export DB_UNAME=me
    - export DB_PASS=password
    - export VERSION=$(cat version-file.txt)
  script:
    - envsubst < k8s/comment-secret.yaml | kubectl apply -f -
    - envsubst < k8s/gitlabregcred.yaml | kubectl apply -f -
    - envsubst < k8s/comment-deployment.yaml | kubectl apply -f -
    - envsubst < k8s/comment-svc.yaml | kubectl apply -f -
  artifacts:
    paths:
      - version-file.txt